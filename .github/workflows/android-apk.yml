name: Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: labproof_academy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Release signing secrets are not configured; falling back to debug signing."
            exit 0
          fi

          mkdir -p android/app
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/android/app/upload-keystore.jks" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          VERSION_CODE="${VERSION_LINE#*+}"
          flutter build apk --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE" \
            --dart-define APP_VERSION_NAME="$VERSION_NAME" \
            --dart-define APP_VERSION_CODE="$VERSION_CODE"

      - name: Prepare download artifact
        run: |
          mkdir -p build/web/downloads
          cp build/app/outputs/flutter-apk/app-release.apk build/web/downloads/labproof-academy-student.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: labproof-academy-student-apk
          path: labproof_academy/build/web/downloads/labproof-academy-student.apk

      - name: Publish latest APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: student-latest
          name: LabProof Academy Student Latest
          body: Latest student APK built from ${{ github.sha }}.
          files: labproof_academy/build/web/downloads/labproof-academy-student.apk
          make_latest: true
          overwrite_files: true

      - name: Register update in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_RELEASE_CHANNEL: ${{ vars.APP_RELEASE_CHANNEL }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/student-latest/labproof-academy-student.apk
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase update secrets are not configured; APK release was still published."
            exit 0
          fi

          export APP_RELEASE_CHANNEL="${APP_RELEASE_CHANNEL:-student}"

          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version_line = ""
          with open("pubspec.yaml", "r", encoding="utf-8") as pubspec:
              for line in pubspec:
                  if line.startswith("version:"):
                      version_line = line.split(":", 1)[1].strip()
                      break

          version_name, _, version_code = version_line.partition("+")
          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          service_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          headers = {
              "apikey": service_key,
              "Authorization": "Bearer " + service_key,
              "Content-Type": "application/json",
              "Prefer": "return=minimal",
          }
          payload = {
              "platform": "android",
              "channel": os.environ["APP_RELEASE_CHANNEL"],
              "version_name": version_name,
              "version_code": int(version_code or "1"),
              "download_url": os.environ["DOWNLOAD_URL"],
              "is_required": False,
              "is_active": True,
              "release_notes": "GitHub push orqali avtomatik yig'ilgan APK.",
          }

          request = urllib.request.Request(
              supabase_url + "/rest/v1/app_releases",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers=headers,
          )
          with urllib.request.urlopen(request) as response:
              if response.status not in (200, 201, 204):
                  raise SystemExit(f"Unexpected Supabase status: {response.status}")

          notification = {
              "title": "Yangi yangilanish mavjud",
              "body": f"LabProof Academy {version_name} versiyasi tayyor. Ilovani yangilab oling.",
              "target_role": "student",
              "deep_link": "app://update",
              "message_kind": "text",
              "is_active": True,
          }
          try:
              notify_request = urllib.request.Request(
                  supabase_url + "/rest/v1/notifications",
                  data=json.dumps(notification).encode("utf-8"),
                  method="POST",
                  headers=headers,
              )
              with urllib.request.urlopen(notify_request) as response:
                  if response.status not in (200, 201, 204):
                      print(f"Notification skipped: unexpected status {response.status}")
          except urllib.error.HTTPError as error:
              print(f"Notification skipped: {error.code} {error.reason}")
          PY
