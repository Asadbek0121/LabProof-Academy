<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LabProof Academy laboratory learning management system.">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LabProof Academy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LabProof Academy</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    const host = window.location.hostname;
    const isLocalPreviewHost =
      host === '127.0.0.1' ||
      host === 'localhost' ||
      host === '::1' ||
      /^10\./.test(host) ||
      /^192\.168\./.test(host) ||
      /^172\.(1[6-9]|2\d|3[0-1])\./.test(host);
    const bootVersion = isLocalPreviewHost ? Date.now().toString() : '1';

    if (isLocalPreviewHost && 'serviceWorker' in navigator) {
      navigator.serviceWorker
        .getRegistrations()
        .then((registrations) => {
          if (!registrations.length) return;
          Promise.all(registrations.map((registration) => registration.unregister()))
            .then(() => {
              if (!sessionStorage.getItem('labproof_local_sw_reset')) {
                sessionStorage.setItem('labproof_local_sw_reset', '1');
                window.location.reload();
              }
            });
        })
        .catch(() => {});
    }

    if (isLocalPreviewHost && 'caches' in window) {
      caches
        .keys()
        .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        .catch(() => {});
    }

    const flutterBootstrap = document.createElement('script');
    flutterBootstrap.src = `flutter_bootstrap.js?v=${bootVersion}`;
    flutterBootstrap.async = true;
    document.body.appendChild(flutterBootstrap);
  </script>
</body>
</html>
