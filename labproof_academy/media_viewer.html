<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabProof Academy Media Viewer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      padding: 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #7c3aed;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }
    .card {
      background-color: #1e293b;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 8px;
      margin-bottom: 12px;
      object-fit: contain;
      background-color: #0b0f19;
    }
    .filename {
      font-size: 14px;
      font-weight: bold;
      word-break: break-all;
      text-align: center;
      margin-bottom: 8px;
      color: #f1f5f9;
    }
    .info {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <h1>LabProof Academy Media Viewer</h1>
  <div class="grid" id="grid"></div>

  <script>
    // List of media files in .tempmediaStorage
    const mediaFiles = [
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779089004160.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779089007079.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779089011033.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779089015397.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779089020773.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101116480.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101117697.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101118795.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101118887.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101142949.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101143721.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101144954.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101145920.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779101145953.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122549920.png",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122639662.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122646079.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122656739.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122662094.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122666338.jpg",
      "media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_1779122672713.jpg"
    ];

    const grid = document.getElementById('grid');
    mediaFiles.forEach(file => {
      const card = document.createElement('div');
      card.className = 'card';
      
      const img = document.createElement('img');
      // Using relative or full absolute path for local loading
      img.src = '/Users/macbookairm1/.gemini/antigravity/brain/2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1/.tempmediaStorage/' + file;
      img.alt = file;
      
      const title = document.createElement('div');
      title.className = 'filename';
      title.textContent = file.replace('media_2cca9ccc-8994-47e7-bfdd-d44b8a7d25b1_', '');
      
      card.appendChild(img);
      card.appendChild(title);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
