# PostgreSQL Configuration File tuned for high performance url-shortener
# This file is used in Docker Compose

# ── Connections and Authentication ────────────────────────────
max_connections = 200
superuser_reserved_connections = 3

# ── Resource Usage ─────────────────────────────────────────────
shared_buffers = 256MB                  # 25% of 1GB memory limit
work_mem = 4MB
maintenance_work_mem = 64MB
autovacuum_work_mem = 32MB
dynamic_shared_memory_type = posix

# ── Write Ahead Log ────────────────────────────────────────────
wal_level = replica
synchronous_commit = off                 # High throughput, minor loss risk acceptable for redirection analytics
wal_writer_delay = 200ms
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# ── Query Planner ──────────────────────────────────────────────
random_page_cost = 1.1                   # Optimized for SSDs
effective_cache_size = 768MB             # ~75% of memory limits
effective_io_concurrency = 200           # SSD parallel requests support

# ── Logging ────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000        # Log statements taking more than 1 second

# ── Autovacuum ─────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05    # vacuum when 5% of rows change
autovacuum_analyze_scale_factor = 0.02   # analyze when 2% of rows change

# ── Client Connection Defaults ─────────────────────────────────
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
