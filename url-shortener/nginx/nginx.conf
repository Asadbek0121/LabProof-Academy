worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Basic ───────────────────────────────────────────────────
    include              /etc/nginx/mime.types;
    default_type         application/octet-stream;
    server_tokens        off;
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;
    keepalive_timeout    75s;
    keepalive_requests   1000;
    client_max_body_size 2m;

    # ── Logging ─────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"remote_addr":"$remote_addr",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Compression ─────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml+rss;

    # ── Rate limiting zones ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=redirect_zone:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # ── Caching ─────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=short_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # ── Upstream ─────────────────────────────────────────────────
    upstream app_servers {
        least_conn;
        server app:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────
    server {
        listen      80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ────────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name short.ly www.short.ly;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options          "DENY"             always;
        add_header X-Content-Type-Options   "nosniff"          always;
        add_header X-XSS-Protection         "1; mode=block"    always;
        add_header Referrer-Policy          "no-referrer"      always;
        add_header Permissions-Policy       "geolocation=(), microphone=()" always;

        # Connection limit
        limit_conn conn_zone 20;

        # ── Redirect route (short URLs) ─────────────────────────
        location ~ ^/[a-zA-Z0-9_-]{3,50}$ {
            limit_req zone=redirect_zone burst=50 nodelay;

            # Cache 301 redirects for 5 minutes
            proxy_cache short_cache;
            proxy_cache_valid 301 5m;
            proxy_cache_valid 302 0;
            proxy_cache_use_stale error timeout invalid_header;
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass         http://app_servers;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
        }

        # ── Auth endpoints ──────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass         http://app_servers;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API endpoints ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass         http://app_servers;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Health checks (no rate limit) ───────────────────────
        location ~ ^/(health|readyz)$ {
            proxy_pass http://app_servers;
            access_log off;
        }

        # ── Block unwanted paths ────────────────────────────────
        location ~ \.(php|asp|aspx|jsp)$ {
            return 404;
        }
    }
}
