groups:
  - name: url-shortener.alerts
    interval: 30s
    rules:

      # ── Availability ──────────────────────────────────────────────
      - alert: AppDown
        expr: up{job="url-shortener"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary:     "URL Shortener instance down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: >
          rate(urlshortener_api_request_duration_ms_count{status_code=~"5.."}[5m]) /
          rate(urlshortener_api_request_duration_ms_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary:     "High error rate (>5%)"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # ── Latency ────────────────────────────────────────────────────
      - alert: HighRedirectLatency
        expr: histogram_quantile(0.95, rate(urlshortener_redirect_latency_ms_bucket[5m])) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "P95 redirect latency > 100ms"
          description: "P95 redirect latency is {{ $value }}ms."

      - alert: VeryHighRedirectLatency
        expr: histogram_quantile(0.99, rate(urlshortener_redirect_latency_ms_bucket[5m])) > 500
        for: 2m
        labels:
          severity: critical
        annotations:
          summary:     "P99 redirect latency > 500ms"
          description: "P99 redirect latency is {{ $value }}ms — SLA breach risk."

      # ── Rate Limiting ──────────────────────────────────────────────
      - alert: HighRateLimitViolations
        expr: rate(urlshortener_rate_limit_hits_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High rate limit violations"
          description: "{{ $value }} rate limit violations/sec — possible abuse."

      # ── Database ───────────────────────────────────────────────────
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary:     "PostgreSQL is down"
          description: "Cannot connect to PostgreSQL."

      - alert: HighDBConnections
        expr: pg_stat_activity_count > 150
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "PostgreSQL connection count high (>150)"
          description: "Current connections: {{ $value }}"

      - alert: SlowDBQueries
        expr: >
          histogram_quantile(0.95, rate(urlshortener_db_query_duration_ms_bucket[5m])) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "Slow DB queries detected (P95 > 500ms)"
          description: "P95 DB query latency: {{ $value }}ms"

      # ── Redis ──────────────────────────────────────────────────────
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary:     "Redis is down"
          description: "Redis cache is unreachable — rate limiting and caching disabled."

      - alert: HighRedisMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "Redis memory usage > 85%"
          description: "Redis memory at {{ $value | humanizePercentage }}."

      # ── Pod ────────────────────────────────────────────────────────
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="url-shortener"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary:     "Pod is crash-looping"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting."

      - alert: LowReplicaCount
        expr: kube_deployment_status_replicas_available{deployment="url-shortener", namespace="url-shortener"} < 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary:     "URL Shortener has fewer than 2 replicas"
          description: "Only {{ $value }} replicas available."
