---
# ============================================================
# App Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  namespace: url-shortener
  labels:
    app:       url-shortener
    component: api
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app:       url-shortener
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge:       1
  template:
    metadata:
      labels:
        app:       url-shortener
        component: api
        version:   "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: url-shortener-sa

      # Spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: url-shortener
                topologyKey: kubernetes.io/hostname

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: url-shortener
          image: url-shortener:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name:          http
              protocol:      TCP

          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: url-shortener-config

          # Secrets injected individually
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  JWT_SECRET
            - name: METRICS_SECRET
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  METRICS_SECRET
            - name: IP_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  IP_HASH_SALT

          # Resource limits
          resources:
            requests:
              memory: 128Mi
              cpu:    100m
            limits:
              memory: 512Mi
              cpu:    500m

          # Liveness probe (app alive?)
          livenessProbe:
            httpGet:
              path:   /health
              port:   3000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds:       15
            timeoutSeconds:      5
            failureThreshold:    3
            successThreshold:    1

          # Readiness probe (ready to receive traffic?)
          readinessProbe:
            httpGet:
              path:   /readyz
              port:   3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds:       10
            timeoutSeconds:      5
            failureThreshold:    3
            successThreshold:    1

          # Startup probe (wait for slow start)
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds:       5
            failureThreshold:    12 # 60s total

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name:      logs
              mountPath: /app/logs
            - name:      tmp
              mountPath: /tmp

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}

---
# ============================================================
# App Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-service
  namespace: url-shortener
  labels:
    app:       url-shortener
    component: api
spec:
  selector:
    app:       url-shortener
    component: api
  ports:
    - port:       80
      targetPort: 3000
      protocol:   TCP
      name:       http
  type: ClusterIP

---
# ============================================================
# ServiceAccount
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: url-shortener-sa
  namespace: url-shortener
  labels:
    app: url-shortener

---
# ============================================================
# Horizontal Pod Autoscaler
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: url-shortener-hpa
  namespace: url-shortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       url-shortener
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type:          Pods
          value:         3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120

---
# ============================================================
# PodDisruptionBudget (ensures availability during upgrades)
# ============================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: url-shortener-pdb
  namespace: url-shortener
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app:       url-shortener
      component: api
