---
# ============================================================
# Ingress — routes external traffic to the app service
# Uses nginx-ingress-controller
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  labels:
    app: url-shortener
  annotations:
    # Controller
    kubernetes.io/ingress.class: nginx

    # SSL — cert-manager with Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Rate limiting at ingress level
    nginx.ingress.kubernetes.io/limit-rps:         "100"
    nginx.ingress.kubernetes.io/limit-connections:  "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size:        "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout:     "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout:  "5"
    nginx.ingress.kubernetes.io/proxy-send-timeout:     "30"

    # HSTS
    nginx.ingress.kubernetes.io/force-ssl-redirect:    "true"
    nginx.ingress.kubernetes.io/ssl-redirect:          "true"
    nginx.ingress.kubernetes.io/hsts:                  "true"
    nginx.ingress.kubernetes.io/hsts-max-age:          "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"

    # Security
    nginx.ingress.kubernetes.io/enable-cors:          "true"
    nginx.ingress.kubernetes.io/cors-allow-origin:    "https://short.ly"
    nginx.ingress.kubernetes.io/cors-allow-methods:   "GET, POST, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers:   "Authorization, Content-Type, X-API-Key"

    # Custom error pages
    nginx.ingress.kubernetes.io/custom-http-errors: "404,429,500,503"

    # Upstream config
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"  # Sticky by URL for better cache hit
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - short.ly
        - www.short.ly
      secretName: url-shortener-tls
  rules:
    - host: short.ly
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: url-shortener-service
                port:
                  name: http
    - host: www.short.ly
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: url-shortener-service
                port:
                  name: http

---
# ============================================================
# NetworkPolicy — restrict pod communication
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: url-shortener-netpol
  namespace: url-shortener
spec:
  podSelector:
    matchLabels:
      app: url-shortener
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: url-shortener
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow HTTPS outbound (for geoip updates, etc.)
    - ports:
        - protocol: TCP
          port: 443

---
# ============================================================
# ResourceQuota — namespace-level limits
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: url-shortener-quota
  namespace: url-shortener
spec:
  hard:
    requests.cpu:     "4"
    requests.memory:  "8Gi"
    limits.cpu:       "8"
    limits.memory:    "16Gi"
    pods:             "50"
    services:         "10"
    persistentvolumeclaims: "10"

---
# ============================================================
# LimitRange — default per-container limits
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: url-shortener-limits
  namespace: url-shortener
spec:
  limits:
    - type: Container
      default:
        cpu:    500m
        memory: 512Mi
      defaultRequest:
        cpu:    100m
        memory: 128Mi
      max:
        cpu:    "2"
        memory: 2Gi
