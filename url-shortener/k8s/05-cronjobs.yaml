---
# ============================================================
# CronJob — Create next month's analytics partition
# Runs on the 25th of each month at 02:00
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: analytics-partition-creator
  namespace: url-shortener
spec:
  schedule: "0 2 25 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: partition-creator
              image: url-shortener:latest
              command: ["node", "scripts/create-partition.js"]
              envFrom:
                - configMapRef:
                    name: url-shortener-config
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: url-shortener-secrets
                      key:  DB_PASSWORD
              resources:
                requests:
                  memory: 64Mi
                  cpu:    50m
                limits:
                  memory: 128Mi
                  cpu:    100m

---
# ============================================================
# CronJob — Refresh materialized views
# Every 5 minutes
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: refresh-dashboard-stats
  namespace: url-shortener
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: refresh-stats
              image: url-shortener:latest
              command: ["node", "-e", "require('./src/models/db').query('SELECT refresh_dashboard_stats()').then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); })"]
              envFrom:
                - configMapRef:
                    name: url-shortener-config
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: url-shortener-secrets
                      key:  DB_PASSWORD
              resources:
                requests:
                  memory: 64Mi
                  cpu:    50m
                limits:
                  memory: 128Mi
                  cpu:    100m

---
# ============================================================
# CronJob — Cleanup expired URLs (soft-deleted + expired)
# Daily at 03:00
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-expired-urls
  namespace: url-shortener
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: url-shortener:latest
              command:
                - "node"
                - "-e"
                - |
                  const db = require('./src/models/db');
                  (async () => {
                    const r = await db.query(`
                      DELETE FROM urls 
                      WHERE (is_active = FALSE OR expires_at < NOW()) 
                      AND created_at < NOW() - INTERVAL '30 days'
                      RETURNING id
                    `);
                    console.log('Cleaned up', r.rowCount, 'expired URLs');
                    await db.close();
                    process.exit(0);
                  })().catch(e => { console.error(e); process.exit(1); });
              envFrom:
                - configMapRef:
                    name: url-shortener-config
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: url-shortener-secrets
                      key:  DB_PASSWORD
              resources:
                requests:
                  memory: 64Mi
                  cpu:    50m
                limits:
                  memory: 128Mi
                  cpu:    100m
