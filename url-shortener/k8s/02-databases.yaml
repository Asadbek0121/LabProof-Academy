---
# ============================================================
# PostgreSQL StatefulSet
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: url-shortener
  labels:
    app:       postgres
    component: database
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app:       postgres
        component: database
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsUser:  999
        runAsGroup: 999
        fsGroup:    999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name:  POSTGRES_DB
              value: "urlshortener"
            - name:  POSTGRES_USER
              value: "urluser"
            - name:  POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  DB_PASSWORD
            - name:  PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "postgres"
            - "-c"
            - "max_connections=200"
            - "-c"
            - "shared_buffers=256MB"
            - "-c"
            - "effective_cache_size=768MB"
            - "-c"
            - "work_mem=4MB"
            - "-c"
            - "maintenance_work_mem=64MB"
            - "-c"
            - "wal_buffers=16MB"
            - "-c"
            - "checkpoint_completion_target=0.9"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "log_min_duration_statement=1000"
          resources:
            requests:
              memory: 512Mi
              cpu:    250m
            limits:
              memory: 2Gi
              cpu:    "1"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "urluser", "-d", "urlshortener"]
            initialDelaySeconds: 30
            periodSeconds:       10
            timeoutSeconds:      5
            failureThreshold:    3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "urluser", "-d", "urlshortener"]
            initialDelaySeconds: 5
            periodSeconds:       5
            timeoutSeconds:      3
          volumeMounts:
            - name:      postgres-data
              mountPath: /var/lib/postgresql/data
            - name:      postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi

---
# PostgreSQL Headless Service (for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: url-shortener
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432

---
# PostgreSQL ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: url-shortener
  labels:
    app:       postgres
    component: database
spec:
  selector:
    app: postgres
  ports:
    - port:       5432
      targetPort: 5432
      name:       postgres
  type: ClusterIP

---
# ============================================================
# Redis StatefulSet
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: url-shortener
  labels:
    app:       redis
    component: cache
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app:       redis
        component: cache
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser:  999
        runAsGroup: 999
        fsGroup:    999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - "900 1"
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key:  REDIS_PASSWORD
          resources:
            requests:
              memory: 128Mi
              cpu:    100m
            limits:
              memory: 512Mi
              cpu:    250m
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 20
            periodSeconds:       10
            timeoutSeconds:      5
            failureThreshold:    3
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds:       5
          volumeMounts:
            - name:      redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---
# Redis Headless
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: url-shortener
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379

---
# Redis ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: url-shortener
  labels:
    app:       redis
    component: cache
spec:
  selector:
    app: redis
  ports:
    - port:       6379
      targetPort: 6379
      name:       redis
  type: ClusterIP
