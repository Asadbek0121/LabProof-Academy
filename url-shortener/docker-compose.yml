version: '3.9'

services:
  # ── App (URL Shortener API) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: url-shortener:latest
    container_name: url-shortener-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:            production
      PORT:                3000
      HOST:                0.0.0.0
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             urlshortener
      DB_USER:             urluser
      DB_PASSWORD:         ${DB_PASSWORD:-StrongPassword123!}
      DB_POOL_MIN:         2
      DB_POOL_MAX:         20
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      REDIS_PASSWORD:      ${REDIS_PASSWORD:-RedisPassword456!}
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production-32chars-minimum}
      BASE_URL:            ${BASE_URL:-http://localhost:3000}
      CORS_ORIGINS:        ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      LOG_LEVEL:           info
      METRICS_ENABLED:     'true'
      METRICS_SECRET:      ${METRICS_SECRET:-metrics-secret}
      RATE_LIMIT_MAX_REQUESTS: 100
      ANALYTICS_FLUSH_INTERVAL: 5000
      TRUST_PROXY:         1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - app-logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512m
          cpus:   '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── PostgreSQL Primary ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: url-shortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       urlshortener
      POSTGRES_USER:     urluser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongPassword123!}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./nginx/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U urluser -d urlshortener"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1g
          cpus:   '1.0'
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c log_min_duration_statement=1000
        -c log_connections=on

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-RedisPassword456!}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisPassword456!}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus:   '0.25'

  # ── Nginx (Reverse Proxy) ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: url-shortener-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-cache:/var/cache/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 128m
          cpus:   '0.25'

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: url-shortener-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - internal

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: url-shortener-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP:     'false'
      GF_SERVER_ROOT_URL:         'http://localhost:3001'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - internal

# ── Networks ─────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  nginx-cache:
  prometheus-data:
  grafana-data:
  app-logs:
